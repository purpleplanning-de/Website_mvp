name: Production – Deploy to IONOS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run build:production

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to IONOS
        run: |
          tar -czf /tmp/deploy.tar.gz -C dist .
          scp -i ~/.ssh/deploy_key /tmp/deploy.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:deploy.tar.gz
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} '
            mkdir -p htdocs
            cd htdocs
            rm -rf assets
            tar xzf ~/deploy.tar.gz
            rm ~/deploy.tar.gz
          '

      - name: Create .htpasswd for Beta Auth
        if: ${{ secrets.HTPASSWD_CONTENT != '' }}
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "
            echo '${{ secrets.HTPASSWD_CONTENT }}' > ~/.htpasswd
            chmod 644 ~/.htpasswd
          "

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} '
            echo "=== POST-DEPLOY: PWD ==="
            pwd
            echo "=== POST-DEPLOY: HTDOCS CONTENTS ==="
            ls -la htdocs/
            echo "=== POST-DEPLOY: INDEX.HTML EXISTS? ==="
            head -5 htdocs/index.html 2>/dev/null || echo "No index.html found!"
            echo "=== POST-DEPLOY: .HTACCESS ==="
            cat htdocs/.htaccess 2>/dev/null || echo "No .htaccess found!"
            echo "=== POST-DEPLOY: ASSETS DIR ==="
            ls -la htdocs/assets/ 2>/dev/null || echo "No assets/ directory"
          '
